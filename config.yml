baseURL: "https://fleed.ir/"          # 👈 YOUR DOMAIN
title: "fleed"                      # your site title
theme: "PaperMod"

# other recommended settings
paginate: 5

params:
  env: production
  description: "A blog about ..."
  author: "Ali AbbaspourBahrani"
  # DateFormat: "January 2, 2006"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  favicon: "/favicon.ico"  
  homeInfoParams:
    Title: "Hi there 👋"
    Content: "Welcome to fleed "

  socialIcons:
    - name: github
      url: "https://github.com/kingbahrani"
    - name: twitter
      url: "https://twitter.com/cypher_krakoa"

# ... you can add more later
